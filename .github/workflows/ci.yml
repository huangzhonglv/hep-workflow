name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validators and tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Check skill mirrors
        run: python scripts/sync_skill_mirrors.py --check

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate schema examples
        run: python scripts/validate_examples.py

      - name: Validate workspace projects
        run: python scripts/validate_workspace_projects.py

      - name: Run pytest
        run: python -m pytest -q
