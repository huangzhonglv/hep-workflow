<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">HEP workflow architecture — academic navy</title>
  <desc id="desc">A high-contrast institutional presentation theme showing execution backends, equipped skills, owner-published workflow stages, contract guardrails, and the workspace evidence path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#11172c"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="violetGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8aa4c7" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#12355b" flood-opacity="0.14"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#5eead4"/>
    </marker>
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#7f93b2"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .eyebrow { fill: #5eead4; font-size: 17px; font-weight: 700; letter-spacing: 3px; }
      .title { fill: #f8fbff; font-size: 45px; font-weight: 700; letter-spacing: -1px; }
      .subtitle { fill: #8fa4c2; font-size: 20px; font-weight: 500; }
      .section-id { fill: #5eead4; font-size: 15px; font-weight: 700; letter-spacing: 2.5px; }
      .section-title { fill: #dbeafe; font-size: 20px; font-weight: 650; }
      .card-title { fill: #f8fafc; font-size: 24px; font-weight: 650; }
      .card-copy { fill: #9eb1cb; font-size: 17px; font-weight: 500; }
      .tiny { fill: #8297b5; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
      .pill { fill: #dbeafe; font-size: 17px; font-weight: 600; }
      .node { fill: #f8fafc; font-size: 17px; font-weight: 650; }
      .node-sub { fill: #9db0ca; font-size: 14px; font-weight: 500; }
      .guard { fill: #cbd5e1; font-size: 16px; font-weight: 600; }
      .workspace-title { fill: #f8fafc; font-size: 20px; font-weight: 650; }
      .workspace-copy { fill: #a8bad2; font-size: 16px; font-weight: 500; }

      /* Institutional navy theme for conference and seminar projection. */
      .eyebrow, .section-id { fill: #1d5fa7; }
      .title, .section-title, .card-title, .pill, .node, .workspace-title { fill: #12355b; }
      .subtitle, .card-copy, .tiny, .node-sub, .workspace-copy { fill: #506779; }
      .guard { fill: #294760; }
      [fill="url(#bg)"] { fill: #f8fafd; }
      [fill="url(#grid)"] { opacity: 0; }
      [fill="url(#cyanGlow)"] { fill: #1d5fa7; }
      [stroke="url(#cyanGlow)"] { stroke: #1d5fa7; }
      [stroke="#2dd4bf"] { stroke: #1d5fa7; }
      [fill="#2563eb"], [fill="#8b5cf6"] { fill: #1d5fa7; opacity: 0.035; }
      [fill="#0e2038"], [fill="#111f35"], [fill="#101f35"] { fill: #ffffff; }
      [fill="#0a1629"], [fill="#0b182b"] { fill: #eef3f8; }
      [fill="#102641"] { fill: #e5f0f7; }
      [fill="#102640"], [fill="#102a43"] { fill: #e7f0f8; }
      [fill="#102b42"] { fill: #e4f0fa; }
      [fill="#332714"] { fill: #fbf2db; }
      [fill="#211b42"] { fill: #f0eaf8; }
      [fill="#0f2137"] { fill: #ffffff; }
      [fill="#143c3c"], [fill="#153b4e"] { fill: #e1edf7; }
      [fill="#12354b"] { fill: #e4f1f5; }
      [fill="#2b2553"] { fill: #ececf8; }
      [fill="#3b3020"] { fill: #fbf2db; }
      [fill="#34d399"], [fill="#22d3ee"] { fill: #1d5fa7; }
      [stroke="#34d399"], [stroke="#22d3ee"] { stroke: #1d5fa7; }
      [fill="#38bdf8"] { fill: #2a8eaf; }
      [stroke="#38bdf8"] { stroke: #2a8eaf; }
      [fill="#a78bfa"] { fill: #5e68b3; }
      [stroke="#a78bfa"] { stroke: #5e68b3; }
      [fill="#fbbf24"] { fill: #c8962d; }
      [stroke="#fbbf24"] { stroke: #c8962d; }
      [fill="#fb7185"] { fill: #0b7a75; }
      [stroke="#fb7185"] { stroke: #0b7a75; }
      [fill="#5eead4"] { fill: #0b7a75; }
      [stroke="#5eead4"] { stroke: #0b7a75; }
      [fill="#6ee7b7"] { fill: #1d5fa7; }
      [fill="#7dd3fc"] { fill: #2a718c; }
      [fill="#c4b5fd"] { fill: #5e68b3; }
      [fill="#fde68a"] { fill: #8a6412; }
      [stroke="#244565"], [stroke="#263f5d"], [stroke="#3c5777"], [stroke="#42607d"] { stroke: #bdcad5; }
      [stroke="#2c5276"], [stroke="#2a5579"] { stroke: #70879a; }
      [stroke="#6d819f"], [stroke="#7f93b2"] { stroke: #8294a4; }
    </style>
  </defs>

  <rect width="1800" height="1040" fill="url(#bg)"/>
  <rect width="1800" height="1040" fill="url(#grid)"/>
  <circle cx="1580" cy="80" r="320" fill="#2563eb" opacity="0.055"/>
  <circle cx="1680" cy="140" r="180" fill="#8b5cf6" opacity="0.07"/>

  <g transform="translate(72 48)">
    <rect x="0" y="0" width="10" height="76" rx="5" fill="url(#cyanGlow)"/>
    <text class="eyebrow" x="34" y="17">HEP WORKFLOW / SYSTEM MAP</text>
    <text class="title" x="32" y="66">HEP Workflow: owner-published, contract-verified evidence</text>
    <rect x="1280" y="4" width="356" height="52" rx="26" fill="#102640" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <circle cx="1313" cy="30" r="7" fill="#34d399" filter="url(#softGlow)"/>
    <text class="tiny" x="1335" y="35">FAIL-CLOSED EVIDENCE PIPELINE</text>
  </g>

  <g transform="translate(72 150)">
    <text class="section-id" x="0" y="0">01 / EXECUTION PLANE</text>
    <text class="section-title" x="248" y="1">Execution backends &amp; validation tooling</text>

    <g transform="translate(0 30)" filter="url(#shadow)">
      <rect width="390" height="124" rx="18" fill="#0e2038" stroke="#244565"/>
      <rect x="0" y="0" width="7" height="124" rx="4" fill="#34d399"/>
      <circle cx="45" cy="43" r="18" fill="#143c3c" stroke="#34d399"/>
      <text class="tiny" x="45" y="48" text-anchor="middle" fill="#6ee7b7">01</text>
      <text class="card-title" x="78" y="48">Package-X / Wolfram</text>
      <text class="card-copy" x="30" y="91">symbolic amplitudes · loop calculations</text>
    </g>

    <g transform="translate(414 30)" filter="url(#shadow)">
      <rect width="390" height="124" rx="18" fill="#0e2038" stroke="#244565"/>
      <rect x="0" y="0" width="7" height="124" rx="4" fill="#38bdf8"/>
      <circle cx="45" cy="43" r="18" fill="#12354b" stroke="#38bdf8"/>
      <text class="tiny" x="45" y="48" text-anchor="middle" fill="#7dd3fc">02</text>
      <text class="card-title" x="78" y="48">Python workflow scripts</text>
      <text class="card-copy" x="30" y="91">mechanical publication · state transitions</text>
    </g>

    <g transform="translate(828 30)" filter="url(#shadow)">
      <rect width="390" height="124" rx="18" fill="#0e2038" stroke="#244565"/>
      <rect x="0" y="0" width="7" height="124" rx="4" fill="#a78bfa"/>
      <circle cx="45" cy="43" r="18" fill="#2b2553" stroke="#a78bfa"/>
      <text class="tiny" x="45" y="48" text-anchor="middle" fill="#c4b5fd">03</text>
      <text class="card-title" x="78" y="48">Numerics + plotting</text>
      <text class="card-copy" x="30" y="91">seeded scans · exclusions · figures</text>
    </g>

    <g transform="translate(1242 30)" filter="url(#shadow)">
      <rect width="390" height="124" rx="18" fill="#0e2038" stroke="#244565"/>
      <rect x="0" y="0" width="7" height="124" rx="4" fill="#fbbf24"/>
      <circle cx="45" cy="43" r="18" fill="#3b3020" stroke="#fbbf24"/>
      <text class="tiny" x="45" y="48" text-anchor="middle" fill="#fde68a">04</text>
      <text class="card-title" x="78" y="48">Schemas + validators</text>
      <text class="card-copy" x="30" y="91">strict inputs · cross-file invariants</text>
    </g>
  </g>

  <path d="M267 306V336H1534V306M681 306V336M1095 306V336" fill="none" stroke="#2c5276" stroke-width="2"/>
  <path d="M900 336V379" fill="none" stroke="#5eead4" stroke-width="3" marker-end="url(#arrowCyan)"/>
  <rect x="837" y="328" width="126" height="28" rx="14" fill="#102a43" stroke="#2a5579"/>
  <text class="tiny" x="900" y="347" text-anchor="middle">CLI / SCRIPTS</text>

  <g transform="translate(72 394)">
    <rect x="0" y="0" width="1656" height="402" rx="24" fill="#0a1629" fill-opacity="0.9" stroke="#263f5d" filter="url(#shadow)"/>
    <text class="section-id" x="28" y="38">02 / REASONING → OWNED PUBLICATION</text>
    <text class="section-title" x="454" y="39">Skills generate; agents coordinate; owners publish</text>

    <g transform="translate(28 64)">
      <g>
        <rect width="240" height="48" rx="24" fill="#102b42" stroke="#22d3ee" stroke-opacity="0.7"/>
        <circle cx="25" cy="24" r="7" fill="#22d3ee"/>
        <text class="pill" x="44" y="30">hep-paper-formalize</text>
      </g>
      <g transform="translate(260)">
        <rect width="188" height="48" rx="24" fill="#102b42" stroke="#22d3ee" stroke-opacity="0.7"/>
        <circle cx="25" cy="24" r="7" fill="#22d3ee"/>
        <text class="pill" x="44" y="30">hep-idea</text>
      </g>
      <g transform="translate(468)">
        <rect width="224" height="48" rx="24" fill="#102b42" stroke="#22d3ee" stroke-opacity="0.7"/>
        <circle cx="25" cy="24" r="7" fill="#22d3ee"/>
        <text class="pill" x="44" y="30">package-scribe</text>
      </g>
      <g transform="translate(712)">
        <rect width="214" height="48" rx="24" fill="#102b42" stroke="#22d3ee" stroke-opacity="0.7"/>
        <circle cx="25" cy="24" r="7" fill="#22d3ee"/>
        <text class="pill" x="44" y="30">hep-numerics</text>
      </g>
      <g transform="translate(946)">
        <rect width="238" height="48" rx="24" fill="#332714" stroke="#fbbf24" stroke-opacity="0.8"/>
        <circle cx="25" cy="24" r="7" fill="#fbbf24"/>
        <text class="pill" x="44" y="30">schemas + contracts</text>
      </g>
      <g transform="translate(1204)">
        <rect width="396" height="48" rx="24" fill="#211b42" stroke="#a78bfa" stroke-opacity="0.8"/>
        <circle cx="25" cy="24" r="7" fill="#a78bfa"/>
        <text class="pill" x="44" y="30">mirrored skill trees · byte-identical</text>
      </g>
    </g>

    <g opacity="0.82" fill="none" stroke="#6e879b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M148 112L340 158"/>
      <path d="M382 112L573 158"/>
      <path d="M608 112L806 158"/>
      <path d="M847 112L1039 158"/>
      <path d="M1093 112V128H1505V158" stroke-dasharray="5 6"/>
      <path d="M1402 112V140H1505V158"/>
    </g>

    <g transform="translate(28 158)">
      <path d="M205 53H228M438 53H461M671 53H694M904 53H927M1137 53H1160M1370 53H1393"
            stroke="#5eead4" stroke-width="2.5" marker-end="url(#arrowCyan)"/>

      <g>
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="42" text-anchor="middle">hep-orchestrator</text>
        <text class="node-sub" x="102.5" y="70" text-anchor="middle">model-first routing</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
      <g transform="translate(233)">
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="42" text-anchor="middle">repro-orchestrator</text>
        <text class="node-sub" x="102.5" y="70" text-anchor="middle">typed prerequisites</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
      <g transform="translate(466)">
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="36" text-anchor="middle">owner-published</text>
        <text class="node" x="102.5" y="60" text-anchor="middle">foundation</text>
        <text class="node-sub" x="102.5" y="84" text-anchor="middle">candidate → live</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
      <g transform="translate(699)">
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="36" text-anchor="middle">finalized</text>
        <text class="node" x="102.5" y="60" text-anchor="middle">calculations</text>
        <text class="node-sub" x="102.5" y="84" text-anchor="middle">scoped publication</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
      <g transform="translate(932)">
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="36" text-anchor="middle">manifest-v2</text>
        <text class="node" x="102.5" y="60" text-anchor="middle">scans + figures</text>
        <text class="node-sub" x="102.5" y="84" text-anchor="middle">owned analyses</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
      <g transform="translate(1165)">
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="36" text-anchor="middle">typed readiness</text>
        <text class="node" x="102.5" y="60" text-anchor="middle">+ comparison</text>
        <text class="node-sub" x="102.5" y="84" text-anchor="middle">honest verdict</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
      <g transform="translate(1398)">
        <rect width="205" height="106" rx="15" fill="#111f35" stroke="#fb7185" stroke-width="2"/>
        <text class="node" x="102.5" y="36" text-anchor="middle">validation +</text>
        <text class="node" x="102.5" y="60" text-anchor="middle">recovery</text>
        <text class="node-sub" x="102.5" y="84" text-anchor="middle">fail closed</text>
        <circle cx="20" cy="18" r="4" fill="#fb7185"/>
      </g>
    </g>

    <text class="tiny" x="28" y="303">CONTRACT GUARDRAILS / AUDIT</text>
    <g transform="translate(28 320)">
      <g>
        <rect width="300" height="54" rx="12" fill="#0f2137" stroke="#42607d"/>
        <text class="guard" x="150" y="33" text-anchor="middle">manifest v2 + owner writes</text>
      </g>
      <g transform="translate(322)">
        <rect width="300" height="54" rx="12" fill="#0f2137" stroke="#42607d"/>
        <text class="guard" x="150" y="33" text-anchor="middle">strict JSON + canonical IDs</text>
      </g>
      <g transform="translate(644)">
        <rect width="300" height="54" rx="12" fill="#0f2137" stroke="#42607d"/>
        <text class="guard" x="150" y="33" text-anchor="middle">exact-byte provenance</text>
      </g>
      <g transform="translate(966)">
        <rect width="300" height="54" rx="12" fill="#0f2137" stroke="#42607d"/>
        <text class="guard" x="150" y="33" text-anchor="middle">transactions + recovery</text>
      </g>
      <g transform="translate(1288)">
        <rect width="315" height="54" rx="12" fill="#0f2137" stroke="#42607d"/>
        <text class="guard" x="157.5" y="25" text-anchor="middle">typed readiness +</text>
        <text class="guard" x="157.5" y="44" text-anchor="middle">honest comparison</text>
      </g>
    </g>
  </g>

  <g transform="translate(72 828)">
    <text class="section-id" x="0" y="0">03 / WORKSPACE EVIDENCE PATH</text>
    <text class="section-title" x="336" y="1">User intent becomes owner-indexed, immutable evidence</text>
    <g transform="translate(0 28)" filter="url(#shadow)">
      <rect width="1656" height="148" rx="22" fill="#0b182b" stroke="#263f5d"/>
      <path d="M398 74H478M1178 74H1258" stroke="#5eead4" stroke-width="3" marker-end="url(#arrowCyan)"/>

      <g transform="translate(24 24)">
        <rect width="374" height="100" rx="16" fill="#101f35" stroke="#3c5777"/>
        <text class="tiny" x="24" y="27">INPUT</text>
        <text class="workspace-title" x="24" y="57">Scientific intent</text>
        <text class="workspace-copy" x="24" y="82">natural language · LaTeX · paper/PDF inputs</text>
      </g>

      <g transform="translate(482 16)">
        <rect width="696" height="116" rx="18" fill="#102641" stroke="url(#cyanGlow)" stroke-width="2"/>
        <rect x="24" y="25" width="58" height="58" rx="15" fill="#153b4e" stroke="#2dd4bf"/>
        <path d="M41 54h24M53 42v24" stroke="#5eead4" stroke-width="3" stroke-linecap="round"/>
        <text class="tiny" x="104" y="34">WORKSPACE PROJECT</text>
        <text class="workspace-title" x="104" y="65">manifest v2 + owner-indexed artifacts</text>
        <text class="workspace-copy" x="104" y="91">typed state · dependency snapshots · coherent generations</text>
      </g>

      <g transform="translate(1262 24)">
        <rect width="370" height="100" rx="16" fill="#101f35" stroke="#3c5777"/>
        <text class="tiny" x="24" y="27">OUTPUT</text>
        <text class="workspace-title" x="24" y="57">Defensible results</text>
        <text class="workspace-copy" x="24" y="82">transactional evidence + immutable runs</text>
      </g>
    </g>
  </g>
</svg>
