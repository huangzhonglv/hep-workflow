<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040">
  <title>HEP workflow architecture</title>
  <desc>Agents route work to skill and script owners; strict validation, exact-byte provenance, manifest version 2 ownership, transactional publication, typed readiness, and honest comparison protect workspace evidence.</desc>
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 35px; font-weight: 700; fill: #495d74; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #495d74; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 700; fill: #495d74; }
      .small-label { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #495d74; }
      .box-text { font-family: Arial, Helvetica, sans-serif; font-size: 26px; fill: #40536a; }
      .box-text-small { font-family: Arial, Helvetica, sans-serif; font-size: 21px; fill: #40536a; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #40536a; }
      .panel { fill: #f2eee6; stroke: #111111; stroke-width: 3; }
      .tool { fill: #fafafa; stroke: #49a95a; stroke-width: 3; }
      .skill { fill: #e7f7fb; stroke: #3ab4d7; stroke-width: 3; }
      .contract { fill: #fff7e4; stroke: #d69022; stroke-width: 3; }
      .mirror { fill: #f2ecff; stroke: #8d6ed7; stroke-width: 3; }
      .dispatch { fill: #ffffff; stroke: #ff4b34; stroke-width: 3; }
      .workspace { fill: #ffffff; stroke: #6d7a88; stroke-width: 2.5; }
      .thin { stroke: #111111; stroke-width: 3; fill: none; }
      .flow-arrow { stroke: #15191f; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin-gray { stroke: #687585; stroke-width: 2; fill: none; }
      .dashed { stroke: #687585; stroke-width: 2; fill: none; stroke-dasharray: 8 9; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#111111"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#687585"/>
    </marker>
    <marker id="flow-arrow-head" markerWidth="8" markerHeight="7" refX="7.2" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#15191f"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#111111"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1040" fill="#ffffff"/>

